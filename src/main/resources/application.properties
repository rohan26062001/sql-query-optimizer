spring.application.name=sql-query-optimizer

spring.ai.ollama.base-url=${OLLAMA_BASE_URL}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:llama3}
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.chat.options.pull-model-strategy=when_missing

# Custom property
ollama.auto-pull-model=${OLLAMA_AUTO_PULL:true}
